apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-cicd
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-boot-cicd
  template:
    metadata:
      labels:
        app: spring-boot-cicd
    spec:
      containers:
      - name: spring-boot-cicd
        image: myusername/spring-boot-cicd:IMAGE_TAG
        ports:
        - containerPort: 8080
        env:
        - name: BUILD_NUMBER
          value: "IMAGE_TAG"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
